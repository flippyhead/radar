<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Radar — Catalogue Review</title>
<style>
  :root {
    --bg: #fafaf9;
    --card: #fff;
    --border: #e6e5e3;
    --text: #1a1a1a;
    --muted: #6b6864;
    --accent: #c85a28;
    --act-now: #2e7d32;
    --explore: #1565c0;
    --radar: #6b6864;
    --dismissed-bg: #f5f5f4;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, system-ui, sans-serif;
    color: var(--text);
    background: var(--bg);
  }
  header {
    position: sticky; top: 0; z-index: 10;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex; align-items: center; gap: 16px;
  }
  header h1 {
    margin: 0; font-size: 17px; font-weight: 600;
    display: flex; align-items: center; gap: 8px;
  }
  header h1::before {
    content: ""; width: 10px; height: 10px; border-radius: 50%;
    background: var(--accent);
  }
  .counts { color: var(--muted); font-size: 13px; }
  .spacer { flex: 1; }
  button.primary {
    padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border);
    background: #fff; cursor: pointer; font-size: 13px;
  }
  button.primary:hover { background: #f5f5f4; }

  .filters {
    padding: 12px 24px; background: var(--bg);
    border-bottom: 1px solid var(--border);
    display: flex; flex-wrap: wrap; gap: 6px; align-items: center;
  }
  .filter-group { display: flex; gap: 4px; align-items: center; }
  .filter-group + .filter-group { margin-left: 12px; padding-left: 12px; border-left: 1px solid var(--border); }
  .filter-label {
    font-size: 11px; text-transform: uppercase; letter-spacing: .04em;
    color: var(--muted); margin-right: 4px;
  }
  .chip {
    padding: 3px 10px; border-radius: 999px; border: 1px solid var(--border);
    background: #fff; cursor: pointer; font-size: 12px; color: var(--text);
    user-select: none;
  }
  .chip:hover { background: #f5f5f4; }
  .chip.active { background: var(--text); color: #fff; border-color: var(--text); }
  .chip .count { margin-left: 4px; opacity: .6; font-size: 11px; }

  main { padding: 20px 24px 80px; max-width: 960px; margin: 0 auto; }
  .tier {
    font-size: 11px; text-transform: uppercase; letter-spacing: .08em;
    color: var(--muted); margin: 24px 0 8px; font-weight: 600;
  }
  .tier:first-child { margin-top: 0; }
  .tier .tier-label { color: var(--accent); font-weight: 700; }

  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 14px 16px; margin-bottom: 10px;
    transition: opacity .15s, box-shadow .15s;
  }
  .card.resolved { opacity: .55; background: var(--dismissed-bg); }
  .card .row { display: flex; align-items: center; gap: 8px; }
  .card .title-row { margin-bottom: 6px; }
  .card .title { font-weight: 600; flex: 1; font-size: 15px; }
  .card .desc { color: var(--text); margin: 4px 0 8px; font-size: 13.5px; }

  .score {
    display: inline-flex; align-items: center; justify-content: center;
    width: 32px; height: 32px; border-radius: 8px;
    font-weight: 700; font-size: 13px; color: #fff;
    flex-shrink: 0;
  }
  .score.s-high { background: var(--act-now); }
  .score.s-mid  { background: var(--explore); }
  .score.s-low  { background: var(--radar); }
  .score.s-none { background: #d6d3d1; color: #78716c; }

  .badge {
    padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500;
  }
  .badge.cat-claude-code, .badge.cat-api { background: #dbeafe; color: #1e40af; }
  .badge.cat-mcp, .badge.cat-agent-sdk   { background: #f3e5f5; color: #6a1b9a; }
  .badge.cat-tooling                      { background: #e0f2f1; color: #00695c; }
  .badge.cat-workflow, .badge.cat-prompting { background: #dcfce7; color: #166534; }
  .badge.cat-general-ai                   { background: #f5f5f4; color: #57534e; }

  .source {
    font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em;
  }
  .date { font-size: 12px; color: var(--muted); }

  .meta-row { margin: 6px 0 10px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

  .url-chip {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 10px; border-radius: 4px; border: 1px solid var(--border);
    background: #f8f9fa; color: #1565c0; font-size: 12px; text-decoration: none;
    max-width: 420px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .url-chip:hover { background: #e3f2fd; }
  .url-chip::after { content: "↗"; font-size: 10px; }

  .tags { display: flex; gap: 4px; flex-wrap: wrap; }
  .tag {
    padding: 1px 7px; border-radius: 3px; background: #f5f5f4;
    font-size: 11px; color: var(--muted);
  }

  .actions { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; align-items: center; }
  .btn {
    padding: 4px 10px; border-radius: 5px; border: 1px solid var(--border);
    background: #fff; cursor: pointer; font-size: 12px; color: var(--text);
  }
  .btn:hover { background: #f5f5f4; }
  .btn.star.active  { background: #fef3c7; border-color: #f59e0b; color: #92400e; }
  .btn.reviewed.active { background: #dbeafe; border-color: #3b82f6; color: #1e40af; }
  .btn.acted.active { background: #dcfce7; border-color: #22c55e; color: #14532d; }
  .btn.danger { color: #b91c1c; margin-left: auto; }

  details.extra { margin-top: 10px; }
  details.extra > summary {
    cursor: pointer; color: var(--muted); font-size: 12px; padding: 4px 0;
    list-style: none; user-select: none;
  }
  details.extra > summary::before { content: "▸ "; font-size: 9px; }
  details.extra[open] > summary::before { content: "▾ "; }

  .breakdown, .notes { margin-top: 6px; padding: 10px 12px; background: #fafaf9; border-radius: 6px; font-size: 12.5px; }
  .breakdown .row { justify-content: space-between; margin: 2px 0; }
  .breakdown .label { color: var(--muted); }
  .note-item { padding: 6px 0; border-bottom: 1px solid var(--border); }
  .note-item:last-child { border-bottom: 0; }
  .note-date { font-size: 11px; color: var(--muted); margin-right: 8px; }

  .dismiss-panel {
    margin-top: 10px; padding: 12px; background: #fef2f2; border: 1px solid #fecaca;
    border-radius: 6px;
  }
  .dismiss-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 8px; }
  .dismiss-tag {
    padding: 4px 10px; border-radius: 12px; border: 1px solid var(--border);
    background: #fff; cursor: pointer; font-size: 12px;
  }
  .dismiss-tag.selected { border-color: #dc2626; background: #fee2e2; color: #991b1b; }
  .dismiss-panel input[type=text] {
    width: 100%; padding: 6px 8px; border-radius: 4px; border: 1px solid var(--border);
    font-size: 13px; margin-bottom: 8px;
  }
  .dismiss-panel .confirm {
    padding: 5px 14px; border-radius: 5px; border: none;
    background: #dc2626; color: #fff; cursor: pointer; font-size: 12px;
  }
  .dismiss-panel .confirm:disabled { background: #d6d3d1; cursor: not-allowed; }

  .note-panel {
    margin-top: 10px; padding: 12px; background: #fafaf9; border: 1px solid var(--border); border-radius: 6px;
  }
  .note-panel textarea {
    width: 100%; padding: 6px 8px; border-radius: 4px; border: 1px solid var(--border);
    font-size: 13px; margin-bottom: 8px; font-family: inherit; resize: vertical; min-height: 50px;
  }

  .empty {
    padding: 48px 24px; text-align: center; color: var(--muted);
  }

  .saving { color: #6b6864; font-size: 11px; margin-left: 6px; opacity: 0; transition: opacity .2s; }
  .saving.visible { opacity: 1; }
  .error-banner {
    background: #fef2f2; border-bottom: 1px solid #fecaca;
    padding: 8px 24px; font-size: 13px; color: #991b1b; text-align: center;
    display: none;
  }
  .error-banner.visible { display: block; }
</style>
</head>
<body>

<header>
  <h1>Radar</h1>
  <span class="counts" id="counts"></span>
  <span class="spacer"></span>
  <button class="primary" id="doneBtn">Done</button>
</header>

<div class="error-banner" id="errorBanner"></div>

<div class="filters">
  <div class="filter-group">
    <span class="filter-label">Status</span>
    <span class="chip active" data-filter="status" data-value="all">All</span>
    <span class="chip" data-filter="status" data-value="new">New</span>
    <span class="chip" data-filter="status" data-value="starred">Starred</span>
    <span class="chip" data-filter="status" data-value="reviewed">Reviewed</span>
    <span class="chip" data-filter="status" data-value="acted-on">Acted on</span>
    <span class="chip" data-filter="status" data-value="dismissed">Dismissed</span>
  </div>
  <div class="filter-group">
    <span class="filter-label">Tier</span>
    <span class="chip active" data-filter="tier" data-value="all">All</span>
    <span class="chip" data-filter="tier" data-value="act">Act Now</span>
    <span class="chip" data-filter="tier" data-value="explore">Worth Exploring</span>
    <span class="chip" data-filter="tier" data-value="radar">On Radar</span>
    <span class="chip" data-filter="tier" data-value="unscored">Unscored</span>
  </div>
  <div class="filter-group">
    <span class="filter-label">Source</span>
    <span class="chip active" data-filter="source" data-value="all">All</span>
    <span class="chip" data-filter="source" data-value="anthropic">Anthropic</span>
    <span class="chip" data-filter="source" data-value="hackernews">HN</span>
    <span class="chip" data-filter="source" data-value="github">GitHub</span>
    <span class="chip" data-filter="source" data-value="dependency">Deps</span>
    <span class="chip" data-filter="source" data-value="news">News</span>
  </div>
</div>

<main id="main"></main>

<script>
let CATALOGUE = { version: "1.0", items: [], insights: [] };

async function api(method, path, body) {
  const opts = { method, headers: { "content-type": "application/json" } };
  if (body !== undefined) opts.body = JSON.stringify(body);
  const res = await fetch(path, opts);
  if (!res.ok) {
    const msg = `${method} ${path} → ${res.status}`;
    showError(msg);
    throw new Error(msg);
  }
  return res.json();
}

function showError(msg) {
  const el = document.getElementById("errorBanner");
  el.textContent = msg;
  el.classList.add("visible");
  setTimeout(() => el.classList.remove("visible"), 4000);
}

async function loadCatalogue() {
  CATALOGUE = await api("GET", "/api/catalogue");
  render();
}

async function patchItem(id, body) {
  const updated = await api("PATCH", "/api/items/" + encodeURIComponent(id), body);
  // Apply returned state locally
  const idx = CATALOGUE.items.findIndex(x => x.id === id);
  if (idx !== -1) CATALOGUE.items[idx] = updated;
}

let state = {
  status: 'all',
  tier: 'all',
  source: 'all',
  expanded: new Set(),
  dismissOpen: new Set(),
  noteOpen: new Set(),
  dismissSelections: {},
};

function tierOf(item) {
  const s = item.score;
  if (s == null) return 'unscored';
  if (s >= 7) return 'act';
  if (s >= 5) return 'explore';
  return 'radar';
}

function sourceKey(item) {
  const s = item.source || '';
  if (s.startsWith('anthropic')) return 'anthropic';
  return s;
}

function relDate(iso) {
  if (!iso) return '';
  const t = new Date(iso);
  const days = Math.floor((Date.now() - t.getTime()) / 86400000);
  if (days === 0) return 'today';
  if (days === 1) return 'yesterday';
  if (days < 30) return days + 'd ago';
  return t.toLocaleDateString();
}

function render() {
  const items = CATALOGUE.items.filter(i => {
    if (state.status !== 'all' && i.status !== state.status) return false;
    if (state.tier   !== 'all' && tierOf(i) !== state.tier) return false;
    if (state.source !== 'all' && sourceKey(i) !== state.source) return false;
    return true;
  });

  // Group by tier (act/explore/radar/unscored), within each group sort by score desc
  const tiers = {act:[], explore:[], radar:[], unscored:[]};
  items.forEach(i => tiers[tierOf(i)].push(i));
  Object.values(tiers).forEach(g => g.sort((a,b) => (b.score||0) - (a.score||0)));

  const tierLabels = {
    act: 'Act Now',
    explore: 'Worth Exploring',
    radar: 'On Radar',
    unscored: 'Unscored',
  };

  let html = '';
  if (items.length === 0) {
    html = '<div class="empty">No items match the current filters.</div>';
  } else {
    for (const [key, label] of Object.entries(tierLabels)) {
      if (tiers[key].length === 0) continue;
      html += `<div class="tier"><span class="tier-label">${label}</span> · ${tiers[key].length}</div>`;
      html += tiers[key].map(renderCard).join('');
    }
  }
  document.getElementById('main').innerHTML = html;

  // Counts
  const total = CATALOGUE.items.length;
  const visible = items.length;
  document.getElementById('counts').textContent = `${visible} of ${total}`;

  // Re-attach chip listeners (idempotent)
  document.querySelectorAll('.chip').forEach(chip => {
    chip.onclick = () => {
      const f = chip.dataset.filter, v = chip.dataset.value;
      state[f] = v;
      document.querySelectorAll(`.chip[data-filter=${f}]`).forEach(c => c.classList.toggle('active', c.dataset.value === v));
      render();
    };
  });
}

function renderCard(item) {
  const sc = item.score;
  const scoreClass = sc == null ? 's-none' : sc >= 7 ? 's-high' : sc >= 5 ? 's-mid' : 's-low';
  const scoreText = sc == null ? '—' : sc;
  const resolved = ['dismissed', 'acted-on'].includes(item.status);
  const cls = resolved ? 'card resolved' : 'card';

  const tags = (item.tags || []).map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('');
  const safeUrl = isSafeUrl(item.url) ? item.url : '#';
  const urlLabel = escapeHtml((item.url || '').replace(/^https?:\/\//, ''));
  const br = item.scoreBreakdown;
  const breakdown = br ? `
    <details class="extra">
      <summary>Score breakdown (${sc}/10)</summary>
      <div class="breakdown">
        <div class="row"><span class="label">Goal alignment</span><span>${br.goalAlignment}/3</span></div>
        <div class="row"><span class="label">Usage gap</span><span>${br.usageGap}/3</span></div>
        <div class="row"><span class="label">Recency</span><span>${br.recency}/2</span></div>
        <div class="row"><span class="label">Effort/impact</span><span>${br.effort}/2</span></div>
      </div>
    </details>` : '';

  const notes = (item.notes && item.notes.length) ? `
    <details class="extra">
      <summary>${item.notes.length} note${item.notes.length===1?'':'s'}</summary>
      <div class="notes">
        ${item.notes.map(n => `<div class="note-item"><span class="note-date">${relDate(n.at)}</span>${escapeHtml(n.text)}</div>`).join('')}
      </div>
    </details>` : '';

  const dismissPanel = state.dismissOpen.has(item.id) ? renderDismissPanel(item) : '';
  const notePanel = state.noteOpen.has(item.id) ? renderNotePanel(item) : '';

  return `
    <div class="card ${resolved?'resolved':''}" data-id="${item.id}">
      <div class="row title-row">
        <div class="score ${scoreClass}">${scoreText}</div>
        <div class="title">${escapeHtml(item.title)}</div>
        <span class="source">${escapeHtml(item.source || '')}</span>
        <span class="date">${relDate(item.discoveredAt)}</span>
      </div>
      <div class="meta-row">
        <span class="badge cat-${escapeHtml(item.category || '')}">${escapeHtml(item.category || '')}</span>
        ${item.status !== 'new' ? `<span class="tag">${escapeHtml(item.status)}</span>` : ''}
      </div>
      <div class="desc">${escapeHtml(item.description || '(no description)')}</div>
      <div class="meta-row">
        <a class="url-chip" href="${escapeHtml(safeUrl)}" target="_blank" rel="noopener">${urlLabel}</a>
        <div class="tags">${tags}</div>
      </div>
      ${breakdown}
      ${notes}
      <div class="actions">
        <button class="btn star ${item.status==='starred'?'active':''}" onclick="setStatus('${item.id}','starred')">★ Star</button>
        <button class="btn reviewed ${item.status==='reviewed'?'active':''}" onclick="setStatus('${item.id}','reviewed')">Reviewed</button>
        <button class="btn acted ${item.status==='acted-on'?'active':''}" onclick="setStatus('${item.id}','acted-on')">Acted on</button>
        <button class="btn" onclick="toggleNote('${item.id}')">Note</button>
        <button class="btn danger" onclick="toggleDismiss('${item.id}')">Dismiss</button>
      </div>
      ${notePanel}
      ${dismissPanel}
    </div>`;
}

function renderDismissPanel(item) {
  const tags = [
    ['already-installed', 'Already installed'],
    ['not-relevant',      'Not relevant'],
    ['already-knew',      'Already knew'],
    ['wrong-score',       'Wrong score'],
    ['save-for-later',    'Save for later'],
  ];
  const sel = state.dismissSelections[item.id] || {};
  return `
    <div class="dismiss-panel">
      <div class="dismiss-tags">
        ${tags.map(([v,l]) => `<span class="dismiss-tag ${sel.tag===v?'selected':''}" onclick="selectDismiss('${item.id}','${v}')">${l}</span>`).join('')}
      </div>
      <input type="text" placeholder="Optional note — why dismiss?" value="${escapeHtml(sel.text||'')}" oninput="updateDismissText('${item.id}', this.value)">
      <button class="confirm" ${!sel.tag?'disabled':''} onclick="confirmDismiss('${item.id}')">Dismiss</button>
    </div>`;
}

function renderNotePanel(item) {
  const v = (state.dismissSelections[item.id+':note'] || {}).text || '';
  return `
    <div class="note-panel">
      <textarea placeholder="Add a note..." oninput="updateNoteText('${item.id}', this.value)">${escapeHtml(v)}</textarea>
      <button class="btn" onclick="addNote('${item.id}')">Save note</button>
    </div>`;
}

// Mutations — persist via server, then re-render from authoritative state
async function setStatus(id, status) {
  const it = CATALOGUE.items.find(x => x.id === id);
  if (!it) return;
  const next = it.status === status ? 'new' : status;
  state.dismissOpen.delete(id);
  state.noteOpen.delete(id);
  try {
    await patchItem(id, { status: next });
  } catch { return; }
  render();
}
function toggleDismiss(id) { state.dismissOpen.has(id) ? state.dismissOpen.delete(id) : state.dismissOpen.add(id); state.noteOpen.delete(id); render(); }
function toggleNote(id)    { state.noteOpen.has(id) ? state.noteOpen.delete(id) : state.noteOpen.add(id); state.dismissOpen.delete(id); render(); }
function selectDismiss(id, tag) { state.dismissSelections[id] = {...(state.dismissSelections[id]||{}), tag}; render(); }
function updateDismissText(id, t) { state.dismissSelections[id] = {...(state.dismissSelections[id]||{}), text: t}; }
function updateNoteText(id, t)    { state.dismissSelections[id+':note'] = {text: t}; }
async function confirmDismiss(id) {
  const sel = state.dismissSelections[id] || {};
  if (!sel.tag) return;
  const body = { status: 'dismissed' };
  const noteText = `[${sel.tag}] ${sel.text||''}`.trim();
  if (noteText) body.note = noteText;
  delete state.dismissSelections[id];
  state.dismissOpen.delete(id);
  try {
    await patchItem(id, body);
  } catch { return; }
  render();
}
async function addNote(id) {
  const sel = state.dismissSelections[id+':note'];
  if (!sel || !sel.text) return;
  const text = sel.text;
  delete state.dismissSelections[id+':note'];
  state.noteOpen.delete(id);
  try {
    await patchItem(id, { note: text });
  } catch { return; }
  render();
}

async function finishSession() {
  try {
    await fetch('/api/exit', { method: 'POST' });
  } catch {}
  // Replace page with plain-text confirmation (no HTML injection)
  document.body.textContent = '';
  const msg = document.createElement('div');
  msg.className = 'empty';
  msg.style.padding = '80px 24px';
  msg.textContent = 'Session complete. You can close this tab.';
  document.body.appendChild(msg);
}

function escapeHtml(s) { return (s==null?'':String(s)).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function isSafeUrl(u) {
  if (typeof u !== 'string' || !u) return false;
  try {
    const parsed = new URL(u);
    return parsed.protocol === 'http:' || parsed.protocol === 'https:';
  } catch { return false; }
}

document.getElementById('doneBtn').onclick = finishSession;
loadCatalogue();
</script>
</body>
</html>
